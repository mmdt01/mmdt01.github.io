---
layout: default
---
{% assign cat = page.categories | first %}
<a class="back-link" href="{{ '/' | append: cat | append: '/' | relative_url }}">
  <i class="ti ti-arrow-left" aria-hidden="true"></i> {{ cat }}
</a>
<p class="post-meta">{{ page.date | date: "%B %Y" }}{% if page.tags %} · {{ page.tags | join: " · " }}{% endif %}</p>
<h1 class="post-title">{{ page.title }}</h1>
<div class="post-body">
  {{ content }}
</div>
